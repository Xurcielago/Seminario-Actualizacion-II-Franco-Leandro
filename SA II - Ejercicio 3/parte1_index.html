<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Alumnos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      flex: 1;
      min-width: 120px;
    }

    label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="text"],
    input[type="number"] {
      padding: 0.5rem 0.7rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      width: 100%;
      background: #fafafa;
      transition: border-color 0.15s;
    }

    input:focus {
      outline: none;
      border-color: #555;
      background: #fff;
    }

    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.6rem;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #444; }

    .error {
      color: #c0392b;
      font-size: 0.82rem;
      margin-top: 0.5rem;
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #888;
      border-bottom: 1px solid #e0e0e0;
    }

    tbody tr:not(:last-child) td {
      border-bottom: 1px solid #f0f0f0;
    }

    td {
      padding: 0.6rem 0.75rem;
    }

    .nota {
      font-weight: 600;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #bbb;
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      width: auto;
      margin: 0;
      transition: color 0.15s;
    }

    .btn-delete:hover { color: #c0392b; background: none; }

    .empty {
      color: #aaa;
      font-size: 0.88rem;
      text-align: center;
      padding: 1.5rem 0;
    }

    .count {
      font-size: 0.78rem;
      color: #999;
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Registro de Alumnos</h1>

    <div class="card">
      <div class="form-row">
        <div class="field">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Ej: Juan Pérez" />
        </div>
        <div class="field" style="max-width:90px">
          <label for="edad">Edad</label>
          <input type="number" id="edad" placeholder="20" min="1" max="99" />
        </div>
        <div class="field" style="max-width:90px">
          <label for="nota">Nota</label>
          <input type="number" id="nota" placeholder="8" min="0" max="10" step="0.01" />
        </div>
      </div>
      <p class="error" id="error">Completá todos los campos correctamente.</p>
      <button onclick="agregar()">Agregar alumno</button>
    </div>

    <div class="card">
      <p class="count" id="count"></p>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Nota</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>
      <p class="empty" id="empty">No hay alumnos cargados.</p>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'alumnos_v1';

    function cargar() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function guardar(alumnos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(alumnos));
    }

    function ordenar(alumnos) {
      return [...alumnos].sort((a, b) =>
        b.nota - a.nota || a.nombre.localeCompare(b.nombre, 'es')
      );
    }

    function renderizar() {
      const alumnos = ordenar(cargar());
      const tbody = document.getElementById('tabla');
      const empty = document.getElementById('empty');
      const count = document.getElementById('count');

      tbody.innerHTML = '';

      if (alumnos.length === 0) {
        empty.style.display = 'block';
        count.textContent = '';
        return;
      }

      empty.style.display = 'none';
      count.textContent = `${alumnos.length} alumno${alumnos.length !== 1 ? 's' : ''} cargado${alumnos.length !== 1 ? 's' : ''}`;

      alumnos.forEach((a, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color:#bbb">${i + 1}</td>
          <td>${escHtml(a.nombre)}</td>
          <td>${a.edad}</td>
          <td class="nota">${Number(a.nota).toFixed(2)}</td>
          <td><button class="btn-delete" onclick="eliminar('${a.id}')" title="Eliminar">✕</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function agregar() {
      const nombre = document.getElementById('nombre').value.trim();
      const edad   = parseInt(document.getElementById('edad').value);
      const nota   = parseFloat(document.getElementById('nota').value);
      const error  = document.getElementById('error');

      if (!nombre || isNaN(edad) || edad < 1 || isNaN(nota) || nota < 0 || nota > 10) {
        error.style.display = 'block';
        return;
      }

      error.style.display = 'none';

      const alumnos = cargar();
      alumnos.push({ id: Date.now().toString(), nombre, edad, nota });
      guardar(alumnos);

      document.getElementById('nombre').value = '';
      document.getElementById('edad').value   = '';
      document.getElementById('nota').value   = '';
      document.getElementById('nombre').focus();

      renderizar();
    }

    function eliminar(id) {
      const alumnos = cargar().filter(a => a.id !== id);
      guardar(alumnos);
      renderizar();
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Enter para agregar
    document.addEventListener('keydown', e => { if (e.key === 'Enter') agregar(); });

    renderizar();
  </script>
</body>
</html>
